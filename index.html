<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Link resmi Reihan Kaissya untuk Instagram, TikTok, Telegram, GitHub, dan kanal lainnya.">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; style-src 'self' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com; script-src 'self'; upgrade-insecure-requests"
  >
  <title>Reihan Kaissya | Link-in-Bio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="profile" aria-labelledby="profile-name">
      <img
        class="avatar"
        src="foto-profil-256.jpg"
        alt="Foto profil Reihan Kaissya"
        width="96"
        height="96"
        loading="eager"
        decoding="async"
      >
      <h1 class="name" id="profile-name">Reihan Kaissya</h1>
      <p class="bio">Pelajar & Programmer Pemula</p>
    </section>

    <!--
      AREA PENTING: EDIT LINK SOSMED DI SINI

      Cara tambah link baru:
      1. Copy salah satu blok <a class="link-btn"...> di bawah.
      2. Ganti href dengan URL tujuan.
      3. Ganti data-platform dengan nama pendek, contoh: linkedin, portfolio, email.
      4. Ganti teks di <span class="link-text">...</span>.

      Jangan hapus:
      - class="link-btn" karena dipakai CSS dan animasi JS.
      - target="_blank" rel="noopener noreferrer" untuk link eksternal.
      - aria-label kalau teks tombol perlu dibuat lebih jelas untuk screen reader.
    -->
    <nav class="links-container" aria-label="Tautan utama">
      <a class="link-btn" href="https://instagram.com/reihan_ksy" target="_blank" rel="noopener noreferrer" data-platform="ig" aria-label="Buka Instagram Reihan Kaissya">
        <span class="link-icon" aria-hidden="true">
          <i class="fa-brands fa-instagram"></i>
        </span>
        <span class="link-text">Instagram</span>
      </a>

      <a class="link-btn" href="https://tiktok.com/@reihankaissya" target="_blank" rel="noopener noreferrer" data-platform="tt" aria-label="Buka TikTok Reihan Kaissya">
        <span class="link-icon" aria-hidden="true">
          <i class="fa-brands fa-tiktok"></i>
        </span>
        <span class="link-text">TikTok</span>
      </a>

      <a class="link-btn" href="https://t.me/reihanksy" target="_blank" rel="noopener noreferrer" data-platform="tg" aria-label="Buka Telegram Reihan Kaissya">
        <span class="link-icon" aria-hidden="true">
          <i class="fa-brands fa-telegram"></i>
        </span>
        <span class="link-text">Telegram</span>
      </a>

      <a class="link-btn" href="https://github.com/reyyksy" target="_blank" rel="noopener noreferrer" data-platform="gh" aria-label="Buka GitHub Reihan Kaissya">
        <span class="link-icon" aria-hidden="true">
          <i class="fa-brands fa-github"></i>
        </span>
        <span class="link-text">GitHub</span>
      </a>

      <a class="link-btn" href="https://www.facebook.com/share/18TfydJt4n/" target="_blank" rel="noopener noreferrer" data-platform="fb" aria-label="Buka facebook Reihan Kaissya">
        <span class="link-icon" aria-hidden="true">
          <i class="fa-brands fa-facebook"></i>
        </span>
        <span class="link-text">Facebook</span>
      </a>

      <a class="link-btn" href="https://youtu.be/dQw4w9WgXcQ?si=UT8V0echAsEi8HqS" target="_blank" rel="noopener noreferrer" data-platform="yt" aria-label="Buka YouTube Reihan Kaissya">
        <span class="link-icon" aria-hidden="true">
          <i class="fa-brands fa-youtube"></i>
        </span>
        <span class="link-text">YouTube</span>
      </a>
    </nav>
  </main>

  <noscript>
    <p class="noscript-message">JavaScript mati, tapi semua link tetap bisa dibuka.</p>
  </noscript>

  <script src="script.js" defer></script>
</body>
</html>
